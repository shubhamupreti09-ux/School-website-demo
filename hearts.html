<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heart to Heart</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .hearts-container {
      position: relative;
      width: 100%;
      height: 60vh;
      min-height: 400px;
      margin-top: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
    }

    .heart-wrapper {
      position: absolute; /* Changed to absolute for random placement */
      width: 150px;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1000px;
    }

    .heart {
      position: absolute;
      width: 60px;
      height: 60px;
      background: var(--primary);
      transform: rotate(-45deg);
      cursor: pointer;
      box-shadow: 0 0 15px rgba(255, 71, 126, 0.5);
      animation: pulse 1.5s infinite;
      transition: all 0.5s ease;
      z-index: 10;
    }

    .heart::before, .heart::after {
      content: "";
      position: absolute;
      width: 60px;
      height: 60px;
      background: var(--primary);
      border-radius: 50%;
    }

    .heart::before {
      top: -30px;
      left: 0;
    }

    .heart::after {
      top: 0;
      left: 30px;
    }

    .photo-card {
      position: absolute;
      width: 150px;
      height: 180px;
      background: #fff;
      padding: 10px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      border-radius: 5px;
      transform: scale(0.5) rotateY(90deg);
      opacity: 0;
      transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex;
      flex-direction: column;
      z-index: 5;
    }

    .photo-card img {
      width: 100%;
      height: 130px;
      object-fit: cover;
      background: #eee;
      border: 1px solid #ccc;
    }

    .photo-card .caption {
      color: #333;
      text-align: center;
      margin-top: 10px;
      font-size: 0.9rem;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      font-weight: bold;
    }

    /* Activation classes */
    .heart-wrapper.revealed .heart {
      transform: scale(0) rotate(90deg);
      opacity: 0;
      pointer-events: none;
    }

    .heart-wrapper.revealed .photo-card {
      transform: scale(1) rotateY(0deg) rotate(calc(var(--rot)));
      opacity: 1;
    }
    
    .photo-card:hover {
      z-index: 20;
      transform: scale(1.1) rotate(0deg) !important;
    }

    /* Small screen fixes for hearts to prevent overlap */
    @media (max-width: 480px) {
      .heart-wrapper { width: 120px; height: 150px; }
      .heart { width: 45px; height: 45px; }
      .heart::before, .heart::after { width: 45px; height: 45px; }
      .heart::before { top: -22.5px; left: 0; }
      .heart::after { top: 0; left: 22.5px; }
      .photo-card { width: 120px; height: 150px; }
      .photo-card img { height: 105px; }
      .photo-card .caption { font-size: 0.8rem; margin-top: 5px; }
    }
  </style>
</head>
<body>
  <div class="glass-container" style="max-width: 900px; width: 95%;">
    <h1>Sweet Memories 💖</h1>
    <p>In hearts par tap karke dekho peeche kya chhupa hai...</p>
    
    <div class="hearts-container" id="hearts-container">
      <!-- Hearts will be generated by JS -->
    </div>

    <button id="next-btn" class="btn hidden" onclick="window.location.href='surprise1.html'" style="margin-top:30px;">Agla Surprise! 🎁</button>
  </div>

  <script>
    const container = document.getElementById('hearts-container');
    const nextBtn = document.getElementById('next-btn');
    
    // Aapki images yahan dalengi. Abhi placeholders hain.
    const images = [
      { src: "latest-meet.jpg", caption: "Latest Meet" },
      { src: "few-years-ago.jpg", caption: "Few Years Ago" },
      { src: "old-memories.jpg", caption: "Old Memories" },
      { src: "videocall.jpg", caption: "Video Call Memories" }
    ];

    let revealedCount = 0;

    // Shuffle the images first, so different photos are at different places each time
    const randomizedImages = images.sort(() => Math.random() - 0.5);

    randomizedImages.forEach((imgData, idx) => {
      const wrapper = document.createElement('div');
      wrapper.classList.add('heart-wrapper');

      // Random rotation for the polaroid effect
      const randomRot = (Math.random() * 20 - 10) + 'deg';
      wrapper.style.setProperty('--rot', randomRot);

      // Create Heart
      const heart = document.createElement('div');
      heart.classList.add('heart');

      // Create Photo Card
      const card = document.createElement('div');
      card.classList.add('photo-card');
      card.innerHTML = `<img src="${imgData.src}" alt="Memory ${idx+1}">
                        <div class="caption">${imgData.caption}</div>`;

      // Click event
      heart.addEventListener('click', () => {
        wrapper.classList.add('revealed');
        revealedCount++;
        
        if(revealedCount === images.length) {
          setTimeout(() => {
            nextBtn.classList.remove('hidden');
            nextBtn.style.animation = 'pulse 2s infinite';
          }, 1000);
        }
      });

      wrapper.appendChild(heart);
      wrapper.appendChild(card);
      container.appendChild(wrapper);

      // --- Dynamic 2x2 Grid Placement to prevent any overlap ---
      // Get the actual width and height of the wrapper (after it's appended)
      const itemW = wrapper.offsetWidth || 150;
      const itemH = wrapper.offsetHeight || 180;
      
      const cw = container.clientWidth;
      const ch = container.clientHeight;
      
      // Determine which grid cell this item belongs to (0: TL, 1: TR, 2: BL, 3: BR)
      const col = idx % 2;
      const row = Math.floor(idx / 2);
      
      const cellW = cw / 2;
      const cellH = ch / 2;
      
      // Calculate random offset constrained inside the current cell
      const maxOffsetX = Math.max(0, cellW - itemW - 10); // 10px padding margin
      const maxOffsetY = Math.max(0, cellH - itemH - 10);
      
      const offsetX = Math.random() * maxOffsetX + 5; // 5px min padding
      const offsetY = Math.random() * maxOffsetY + 5;
      
      wrapper.style.left = `${(col * cellW) + offsetX}px`;
      wrapper.style.top = `${(row * cellH) + offsetY}px`;
    });
  </script>
</body>
</html>
