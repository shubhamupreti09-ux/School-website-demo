<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Gallery - Apex International Academy</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .gallery-tab {
        padding: 0.8rem 2rem;
        cursor: pointer;
        border-radius: var(--radius-full);
        transition: all var(--transition-normal);
        font-weight: 600;
        border: 1px solid rgba(255,255,255,0.1);
      }
      .gallery-tab.active {
        background: var(--accent-orange);
        color: white;
        border-color: var(--accent-orange);
      }
      .media-container {
        display: none;
      }
      .media-container.active {
        display: grid;
      }
    </style>
  </head>
  <body class="bg-dark text-primary">
    <!-- Navigation -->
    <header class="header">
      <div class="container flex justify-between items-center py-4">
        <a href="index.html" class="logo flex items-center gap-2">
          <span style="font-size: 1.5rem">🏫</span>
          <span style="font-weight: 700; letter-spacing: -0.5px" id="dyn-school-name"
            >Apex Academy</span
          >
        </a>
        <nav class="nav flex items-center gap-8">
          <a href="index.html" class="nav-link">Home</a>
          <a href="facilities.html" class="nav-link">Facilities</a>
          <a href="faculty.html" class="nav-link">Faculty</a>
          <a href="gallery.html" class="nav-link active">Gallery</a>
          <a href="contact.html" class="nav-link">Contact</a>
          <a href="login.html" class="btn-nav-login">Login Portal</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="section reveal">
        <div class="container">
          <div class="text-center mb-12">
            <span class="badge badge-orange mb-4">Capturing Moments</span>
            <h1 class="text-4xl">Our Gallery</h1>
          </div>

          <div class="flex justify-center gap-4 mb-12">
            <div class="gallery-tab active" onclick="switchGallery('images')">Images</div>
            <div class="gallery-tab" onclick="switchGallery('videos')">Videos</div>
          </div>

          <!-- Image Gallery -->
          <div id="gallery-images" class="media-container active grid grid-cols-3 gap-6">
            <!-- Populated via JS -->
          </div>

          <!-- Video Gallery -->
          <div id="gallery-videos" class="media-container grid grid-cols-2 gap-8">
            <!-- Populated via JS -->
          </div>
        </div>
      </section>
    </main>

    <footer class="py-12 border-t border-white border-opacity-5">
      <div class="container text-center text-muted text-sm">
        <p>&copy; 2024 <span id="footer-school-name">Apex Academy</span>. All rights reserved.</p>
      </div>
    </footer>

    <script src="js/db.js"></script>
    <script>
      const db = new Database();
      const data = db.getData();

      // Dynamic School Name
      document.getElementById("dyn-school-name").textContent = data.content.schoolName;
      document.getElementById("footer-school-name").textContent = data.content.schoolName;

      function switchGallery(type) {
        document.querySelectorAll('.gallery-tab').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.media-container').forEach(cont => cont.classList.remove('active'));
        
        event.target.classList.add('active');
        document.getElementById(`gallery-${type}`).classList.add('active');
      }

      // Load Images
      const imgCont = document.getElementById('gallery-images');
      if(data.gallery && data.gallery.images) {
          data.gallery.images.forEach(src => {
              imgCont.innerHTML += `
                <div class="card-float p-0 overflow-hidden reveal" style="height: 250px;">
                  <img src="${src}" class="w-full h-full object-cover">
                </div>
              `;
          });
      }

      // Load Videos
      const vidCont = document.getElementById('gallery-videos');
      if(data.gallery && data.gallery.videos) {
          data.gallery.videos.forEach(src => {
              vidCont.innerHTML += `
                <div class="card-float p-0 overflow-hidden reveal" style="aspect-ratio: 16/9;">
                  <iframe src="${src}" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
                </div>
              `;
          });
      }

      // Scroll Reveal
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) entry.target.classList.add('active');
        });
      }, { threshold: 0.1 });
      document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
  </body>
</html>
