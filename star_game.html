<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catch the Stars!</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .game-area {
      position: relative;
      width: 100%;
      height: 400px;
      border: 2px dashed rgba(255, 255, 255, 0.3);
      border-radius: 20px;
      overflow: hidden;
      margin-top: 20px;
      background: rgba(0, 0, 0, 0.2);
    }
    
    .magic-star {
      position: absolute;
      width: 50px;
      height: 50px;
      background: #FFD700;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      cursor: pointer;
      box-shadow: 0 0 15px #FFD700;
      animation: explode-in 0.3s ease-out;
      transition: transform 0.1s;
      z-index: 10;
    }

    .magic-star:active {
      transform: scale(0.8);
    }

    .score-board {
      font-size: 1.5rem;
      font-weight: bold;
      margin-top: 15px;
      color: #FFD700;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }

    @keyframes explode-in {
      0% { transform: scale(0); opacity: 0; }
      80% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="glass-container" style="max-width: 800px; width: 95%;">
    <h1>Warm Up: Star Catcher ⭐</h1>
    <p>Journey shuru karne se pehle 15 glowing stars catch karo!</p>
    
    <div class="score-board">Stars Caught: <span id="score">0</span> / 15</div>

    <div class="game-area" id="game-area">
      <!-- Stars will be spawned here -->
    </div>

    <button id="next-btn" class="btn hidden" onclick="window.location.href='game1.html'" style="margin-top:20px;">Awesome! First Game 👉</button>
  </div>

  <script>
    const gameArea = document.getElementById('game-area');
    const scoreEl = document.getElementById('score');
    const nextBtn = document.getElementById('next-btn');
    
    let score = 0;
    const targetScore = 15;
    let spawnTimeout;

    function spawnStar() {
      if(score >= targetScore) return;

      const star = document.createElement('div');
      star.classList.add('magic-star');

      // Random position inside the container
      const maxX = gameArea.clientWidth - 50;
      const maxY = gameArea.clientHeight - 50;
      
      const randomX = Math.random() * maxX;
      const randomY = Math.random() * maxY;
      
      star.style.left = `${randomX}px`;
      star.style.top = `${randomY}px`;

      // Stars stay longer to make it easier
      const despawnTimer = setTimeout(() => {
        if(star.parentNode) {
          gameArea.removeChild(star);
        }
      }, 1500);

      const catchHandler = function(e) {
        e.preventDefault(); // Handle touch correctly
        if(!star.parentNode) return;
        
        clearTimeout(despawnTimer);
        star.style.transform = 'scale(2) rotate(180deg)';
        star.style.opacity = '0';
        
        setTimeout(() => {
          if(star.parentNode) {
            gameArea.removeChild(star);
          }
        }, 200);

        score++;
        scoreEl.textContent = score;

        if (score >= targetScore) {
          gameArea.innerHTML = '<h2 style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); color:#FFD700; text-shadow: 0 0 10px #FFD700; text-align: center; width: 100%;">You are a Star! ✨</h2>';
          nextBtn.classList.remove('hidden');
          nextBtn.style.animation = 'pulse 2s infinite';
        }
      };

      star.addEventListener('mousedown', catchHandler);
      star.addEventListener('touchstart', catchHandler);

      gameArea.appendChild(star);

      // Slower spawn time to make it easier
      const nextSpawnTime = Math.random() * 600 + 400;
      spawnTimeout = setTimeout(spawnStar, nextSpawnTime);
    }

    // Start
    setTimeout(spawnStar, 500);
  </script>
</body>
</html>
