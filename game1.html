<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Game</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .game-board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin: 20px auto;
      max-width: 400px;
    }
    .card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      height: 80px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      cursor: pointer;
      transition: transform 0.3s;
      transform-style: preserve-3d;
    }
    .card.flipped {
      background: rgba(255, 255, 255, 0.2);
      transform: rotateY(180deg);
    }
    .card span {
      display: none;
      transform: rotateY(180deg);
    }
    .card.flipped span {
      display: block;
    }
    .card.matched {
      background: rgba(46, 204, 113, 0.4);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="glass-container" style="max-width: 700px;">
    <h1>Level 1: Brain Test 🧠</h1>
    <p>Sabhi matching cards ko dhundo aage badhne ke liye!</p>
    
    <div class="game-board" id="board">
      <!-- Cards will be injected by JS -->
    </div>

    <button id="next-btn" class="btn hidden" onclick="window.location.href='quiz.html'" style="margin-top:20px;">Shabash! Next Step 👉</button>
  </div>

  <script>
    const emojis = ['🎈', '🎁', '🎂', '🥳', '🎉', '🍰'];
    const gameCards = [...emojis, ...emojis];
    
    // Shuffle
    gameCards.sort(() => Math.random() - 0.5);

    const board = document.getElementById('board');
    const nextBtn = document.getElementById('next-btn');
    
    let flippedCards = [];
    let matchedPairs = 0;

    gameCards.forEach((emoji, index) => {
      const card = document.createElement('div');
      card.classList.add('card');
      card.dataset.value = emoji;
      
      const span = document.createElement('span');
      span.textContent = emoji;
      card.appendChild(span);

      card.addEventListener('click', () => {
        if(flippedCards.length < 2 && !card.classList.contains('flipped') && !card.classList.contains('matched')) {
          card.classList.add('flipped');
          flippedCards.push(card);

          if(flippedCards.length === 2) {
            setTimeout(checkMatch, 800);
          }
        }
      });

      board.appendChild(card);
    });

    function checkMatch() {
      const [card1, card2] = flippedCards;
      if(card1.dataset.value === card2.dataset.value) {
        card1.classList.add('matched');
        card2.classList.add('matched');
        matchedPairs++;
        if(matchedPairs === emojis.length) {
          nextBtn.classList.remove('hidden');
          nextBtn.style.animation = 'pulse 2s infinite';
        }
      } else {
        card1.classList.remove('flipped');
        card2.classList.remove('flipped');
      }
      flippedCards = [];
    }
  </script>
</body>
</html>
